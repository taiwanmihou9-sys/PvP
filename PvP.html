<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEON FIST：霓虹拳域 - 精準格鬥版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; width:100vw; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; }
    #game-container { position:relative; width:100%; max-width:1000px; aspect-ratio:16/9; background:#0a0a14; box-shadow:0 0 60px rgba(0,255,255,0.5); }
    canvas { display:block; width:100%; height:100%; }
    .touch-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:none; }
    .touch-btn { position:absolute; background:rgba(20,20,40,0.75); border:2px solid rgba(0,255,255,0.7); border-radius:14px; color:#0ff; font-weight:bold; display:flex; align-items:center; justify-content:center; pointer-events:auto; touch-action:manipulation; font-size:16px; text-shadow:0 0 8px #0ff; box-shadow:0 0 16px rgba(0,255,255,0.4); transition:0.05s; }
    .touch-btn:active { background:rgba(0,255,255,0.5); border-color:#fff; color:#fff; transform:scale(0.92); }
    .joystick-zone { position:absolute; background:rgba(255,255,255,0.06); border-radius:50%; border:2px solid rgba(0,255,255,0.5); pointer-events:auto; touch-action:none; }
    .menu-overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); color:#fff; pointer-events:auto; z-index:20; }
    .menu-btn { background:transparent; border:2px solid #0ff; color:#0ff; padding:12px 30px; margin:10px; font-size:22px; border-radius:10px; cursor:pointer; transition:0.2s; text-transform:uppercase; letter-spacing:3px; }
    .menu-btn:hover { background:#0ff; color:#000; }
    .char-select-card { width:120px; padding:15px; border:2px solid #555; border-radius:16px; text-align:center; cursor:pointer; background:rgba(10,10,20,0.8); transition:0.2s; margin:8px; }
    .char-select-card.selected { border-color:#0ff; box-shadow:0 0 25px #0ff; background:rgba(0,255,255,0.2); }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="800" height="450"></canvas>
  <div class="touch-layer" id="touchLayer"></div>
  <div class="menu-overlay" id="menuOverlay"></div>
</div>
<script>
  // ==================== 平台偵測 ====================
  const isMobile = window.matchMedia('(pointer: coarse)').matches && window.innerWidth < 1024;
  const CONFIG = {
    platform: isMobile ? 'mobile' : 'desktop',
    mode: isMobile ? 'pve' : 'pvp',
    input: isMobile ? 'single' : 'dual'
  };

  // ==================== 音效引擎 ====================
  let audioCtx;
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  function sfx(freq, dur, type='square', vol=0.07) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }
  const SFX = {
    light: ()=> sfx(700,0.05,'square',0.05),
    medium: ()=> sfx(250,0.07,'sawtooth',0.07),
    heavy: ()=> sfx(90,0.12,'triangle',0.12),
    whoosh: ()=> sfx(300,0.1,'sawtooth',0.05),
    hit: ()=> sfx(150,0.06,'square',0.08),
    super: ()=> sfx(120,0.15,'sawtooth',0.1)
  };

  // ==================== 角色數據 (完整幀數據) ====================
  const CHAR_DATA = {
    yu: {
      name:'優', hp:950, color:'#ff4466',
      light:{dmg:28, st:3, ac:2, rc:5, hs:14, bs:8, rg:44, cancelFrom:2, cancelTo:['medium','sp2','super'], hitstop:2},
      medium:{dmg:68, st:7, ac:3, rc:10, hs:20, bs:12, rg:55, cancelFrom:3, cancelTo:['heavy','sp2','super'], hitstop:3},
      heavy:{dmg:120, st:12, ac:4, rc:20, hs:28, bs:16, rg:70, kb:150, cancelFrom:4, cancelTo:['super'], hitstop:5},
      sp1:{name:'裂步', dmg:0, st:1, ac:6, rc:0, cd:240, type:'dash', dist:120},
      sp2:{name:'黑閃', dmg:145, st:8, ac:10, rc:18, hs:24, bs:14, rg:65, kb:120, cancelFrom:8, cancelTo:['super'], hitstop:5},
      super:{name:'殘響爆裂', dmg:230, st:6, ac:12, rc:22, hs:30, bs:18, cost:1, hitstop:8},
      ultra:{name:'修羅斷界', dmg:380, st:18, ac:15, rc:30, hs:40, bs:24, cost:3, full:true, hitstop:12}
    },
    rion: {
      name:'璃音', hp:900, color:'#cc44ff',
      light:{dmg:24, st:4, ac:2, rc:4, hs:12, bs:7, rg:58, cancelFrom:2, cancelTo:['medium','sp2','super'], hitstop:2},
      medium:{dmg:62, st:8, ac:3, rc:10, hs:18, bs:10, rg:75, cancelFrom:3, cancelTo:['heavy','sp2','super'], hitstop:3},
      heavy:{dmg:130, st:14, ac:5, rc:24, hs:26, bs:15, rg:80, kb:130, cancelFrom:5, cancelTo:['super'], hitstop:6},
      sp1:{name:'光速殘影', dmg:0, st:1, ac:4, rc:6, cd:300, type:'dash', dist:140, invul:4},
      sp2:{name:'霓虹月輪', dmg:145, st:9, ac:12, rc:18, hs:22, bs:13, rg:70, cancelFrom:10, cancelTo:['super'], hitstop:5},
      super:{name:'紫電舞', dmg:220, st:7, ac:14, rc:22, hs:28, bs:16, cost:1, hitstop:8},
      ultra:{name:'月蝕終幕', dmg:360, st:20, ac:16, rc:28, hs:38, bs:22, cost:3, full:true, hitstop:12},
      projectile:{name:'能量彈', dmg:40, st:6, ac:40, rc:14, hs:14, bs:8, speed:7, cd:180}
    }
  };

  // ==================== 粒子池 ====================
  class ParticlePool {
    constructor(max = 120) {
      this.pool = [];
      for (let i = 0; i < max; i++) {
        this.pool.push({ x:0, y:0, vx:0, vy:0, life:0, color:'#fff', active:false });
      }
    }
    spawn(x, y, color) {
      for (let p of this.pool) {
        if (!p.active) {
          p.x = x; p.y = y;
          p.vx = (Math.random() - 0.5) * 7;
          p.vy = (Math.random() - 5) * 6;
          p.life = 18; p.color = color; p.active = true;
          return;
        }
      }
    }
    update() {
      for (let p of this.pool) {
        if (!p.active) continue;
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) p.active = false;
      }
    }
    draw(ctx) {
      for (let p of this.pool) {
        if (!p.active) continue;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
      }
    }
  }

  // ==================== 全局效果管理器 ====================
  const Effects = {
    hitStop: 0,
    screenShake: 0,
    flashAlpha: 0,
    cameraZoom: 1,
    targetZoom: 1,
    comboText: '',
    comboTimer: 0,
    roundText: '',
    roundTextTimer: 0,
    afterImages: [],
    projectiles: [],
    particlePool: new ParticlePool(),
    update() {
      if (this.hitStop > 0) this.hitStop--;
      if (this.screenShake > 0) this.screenShake *= 0.9;
      if (this.flashAlpha > 0) this.flashAlpha -= 0.02;
      this.cameraZoom += (this.targetZoom - this.cameraZoom) * 0.1;
      this.particlePool.update();
      this.afterImages = this.afterImages.filter(ai => { ai.life--; return ai.life > 0; });
      if (this.comboTimer > 0) this.comboTimer--;
      else this.comboText = '';
      if (this.roundTextTimer > 0) this.roundTextTimer--;
      this.projectiles.forEach(p => {
        p.x += p.vx;
        if (p.x < 0 || p.x > 800) p.dead = true;
        let target = (p.owner === player1) ? player2 : player1;
        if (target && rectCollide({x:p.x-5,y:p.y-5,w:10,h:10}, target.hurtbox)) {
          if (!target.isBlocking(p.owner)) { target.takeDamage(p.dmg, p.hs, 0, p.owner); this.flashAlpha = 0.2; SFX.hit(); }
          else { target.takeBlockstun(p.bs); SFX.whoosh(); }
          p.dead = true;
        }
      });
      this.projectiles = this.projectiles.filter(p => !p.dead);
    },
    triggerHitStop(frames) { this.hitStop = Math.max(this.hitStop, frames); },
    addShake(amount) { this.screenShake = Math.max(this.screenShake, amount); },
    addFlash(alpha) { this.flashAlpha = Math.max(this.flashAlpha, alpha); },
    spawnParticles(x,y,color) { this.particlePool.spawn(x,y,color); }
  };

  // ==================== Fighter 類 (改進版) ====================
  class Fighter {
    constructor(charData, x, facingRight, playerIndex, isAI = false) {
      this.char = charData; this.maxHp = charData.hp; this.hp = this.maxHp; this.displayHp = this.hp;
      this.energy = 0; this.x = x; this.y = 350; this.velX = 0; this.velY = 0; this.facingRight = facingRight; this.grounded = true;
      this.state = 'idle'; this.frameCounter = 0;
      this.currentMove = null; this.movePhase = null; this.attackConnected = false;
      this.comboCount = 0; this.hitstunTimer = 0; this.blockstunTimer = 0;
      this.cooldowns = {}; this.armorActive = false; this.parryActive = false;
      this.playerIndex = playerIndex; this.isAI = isAI;
      this.keys = { left:false, right:false, up:false, down:false, light:false, medium:false, heavy:false, sp1:false, sp2:false, super:false, ultra:false, proj:false };
      this.comboDamageScale = 1.0;
      this.aiDelay = 0; this.aiState = 'neutral';
      this.inputBuffer = [];
      this.hurtbox = { x:0, y:0, w:36, h:80 };
      this.pushbox = { x:0, y:0, w:36, h:80 };
      this.shakeOffset = { x:0, y:0 };
    }
    get hitbox() {
      if (this.state !== 'attack' || this.movePhase !== 'active' || !this.currentMove) return null;
      let m = this.currentMove;
      if (m.full) return { x: this.x - 400, y: this.y - 150, w: 800, h: 300 };
      let rng = m.rg || 50;
      let atkX = this.facingRight ? this.x + 10 : this.x - 10 - rng;
      return { x: Math.min(atkX, this.x + 10), y: this.y - 70, w: rng, h: 50 };
    }
    reset(x) {
      this.hp = this.maxHp; this.displayHp = this.hp; this.energy = 0;
      this.x = x; this.y = 350; this.velX = 0; this.velY = 0; this.grounded = true;
      this.state = 'idle'; this.frameCounter = 0;
      this.currentMove = null; this.movePhase = null; this.attackConnected = false; this.comboCount = 0;
      this.hitstunTimer = 0; this.blockstunTimer = 0; this.cooldowns = {}; this.armorActive = false; this.parryActive = false;
      this.comboDamageScale = 1.0; this.inputBuffer = []; this.shakeOffset = {x:0,y:0};
      this.keys = { left:false, right:false, up:false, down:false, light:false, medium:false, heavy:false, sp1:false, sp2:false, super:false, ultra:false, proj:false };
    }
    canAct() { return this.state === 'idle' || this.state === 'move' || this.state === 'crouch'; }
    canCancelInto(nextMove) {
      if (!this.currentMove || !this.currentMove.cancelTo) return false;
      if (this.movePhase !== 'active' && this.movePhase !== 'recovery') return false;
      if (this.movePhase === 'active' && this.frameCounter < this.currentMove.cancelFrom) return false;
      if (this.movePhase === 'recovery' && this.frameCounter > 4) return false;
      return this.currentMove.cancelTo.includes(nextMove);
    }
    bufferInput(moveKey) { this.inputBuffer.push({ key: moveKey, timer: 6 }); }

    startMove(moveKey, forceCancel = false) {
      if (!this.canAct() && !forceCancel) return false;
      if ((moveKey === 'sp1' || moveKey === 'sp2') && this.cooldowns[moveKey] > 0) return false;
      if (moveKey === 'super' && this.energy < 100) return false;
      if (moveKey === 'ultra' && this.energy < 300) return false;
      if (moveKey === 'proj') {
        if (!this.char.projectile) return false; // 安全檢查
        if (this.cooldowns['proj'] > 0) return false;
      }
      let data = moveKey === 'proj' ? this.char.projectile : this.char[moveKey];
      if (!data) return false;

      if (data.type === 'dash') {
        this.state = 'special'; this.currentMove = data; this.movePhase = 'active'; this.frameCounter = 0;
        if (data.dist) this.x += (this.facingRight?1:-1)*data.dist;
        this.x = Math.max(30, Math.min(770, this.x));
        this.cooldowns[moveKey] = data.cd || 180; SFX.whoosh(); return true;
      }
      if (moveKey === 'proj') {
        this.state = 'attack'; this.currentMove = data; this.movePhase = 'startup'; this.frameCounter = 0;
        this.attackConnected = false; this.cooldowns['proj'] = data.cd || 180; return true;
      }
      this.state = 'attack'; this.currentMove = data; this.movePhase = 'startup'; this.frameCounter = 0;
      this.attackConnected = false;
      if (moveKey === 'super') this.energy -= 100;
      if (moveKey === 'ultra') this.energy -= 300;
      if (moveKey === 'sp1' || moveKey === 'sp2') this.cooldowns[moveKey] = data.cd || 200;
      return true;
    }

    updateFrame(opponent) {
      this.hurtbox.x = this.x - 18;
      this.hurtbox.y = this.y - 80;
      this.pushbox.x = this.x - 16;
      this.pushbox.y = this.y - 75;

      for (let k in this.cooldowns) if (this.cooldowns[k] > 0) this.cooldowns[k]--;
      if (this.armorActive && this.state !== 'special') this.armorActive = false;
      if (this.parryActive && this.state !== 'special') this.parryActive = false;
      if (this.displayHp !== this.hp) {
        this.displayHp += (this.hp - this.displayHp) * 0.2;
        if (Math.abs(this.displayHp - this.hp) < 0.5) this.displayHp = this.hp;
      }
      this.shakeOffset.x *= 0.7;
      this.shakeOffset.y *= 0.7;

      // 輸入緩衝 (含優先級：超必>必殺>特2>中>輕)
      for (let i = this.inputBuffer.length - 1; i >= 0; i--) {
        this.inputBuffer[i].timer--;
        if (this.inputBuffer[i].timer <= 0) this.inputBuffer.splice(i, 1);
        else if (this.canAct() || this.canCancelInto(this.inputBuffer[i].key)) {
          this.startMove(this.inputBuffer[i].key, true);
          this.inputBuffer.splice(i, 1);
          break;
        }
      }

      if (this.hitstunTimer > 0) { this.hitstunTimer--; if (this.hitstunTimer <= 0) { this.state = 'idle'; this.currentMove = null; this.comboDamageScale = 1.0; } return; }
      if (this.blockstunTimer > 0) { this.blockstunTimer--; if (this.blockstunTimer <= 0) { this.state = 'idle'; this.currentMove = null; } return; }

      if (this.state === 'attack' || this.state === 'special') {
        this.frameCounter++;
        let m = this.currentMove;
        if (this.movePhase === 'startup') {
          if (this.frameCounter >= m.st) { this.movePhase = 'active'; this.frameCounter = 0; }
        } else if (this.movePhase === 'active') {
          if (m.dmg > 0 && !m.full && this.frameCounter === 0) this.x += (this.facingRight ? 3 : -3);
          if (m.speed && this.frameCounter === 0) {
            Effects.projectiles.push({ x:this.x, y:this.y-40, vx:(this.facingRight?1:-1)*m.speed, dmg:m.dmg, hs:m.hs, bs:m.bs, owner:this });
            if (Effects.projectiles.length > 20) Effects.projectiles.shift();
          }
          if (this.frameCounter < m.ac) {
            if (!this.attackConnected && m.dmg > 0 && this.hitbox && opponent && rectCollide(this.hitbox, opponent.hurtbox)) {
              this.attackConnected = true;
              this.applyHit(opponent, m);
            }
          } else { this.movePhase = 'recovery'; this.frameCounter = 0; }
        } else if (this.movePhase === 'recovery') {
          if (this.frameCounter >= m.rc) {
            this.state = 'idle'; this.currentMove = null; this.movePhase = null;
            this.armorActive = false; this.parryActive = false; this.comboCount = 0; this.comboDamageScale = 1.0;
          }
        }
        return;
      }

      let speed = 3.2;
      if (this.keys.left) this.velX = -speed;
      else if (this.keys.right) this.velX = speed;
      else this.velX = 0;
      if (this.keys.up && this.grounded) { this.velY = -10; this.grounded = false; }
      if (!this.grounded) this.velY += 0.7;
      this.x += this.velX;
      this.y += this.velY;
      this.x = Math.max(25, Math.min(775, this.x));
      if (this.y >= 350) { this.y = 350; this.velY = 0; this.grounded = true; }
      this.state = this.grounded ? (this.velX !== 0 ? 'move' : 'idle') : 'jump';
      if (opponent && this.state !== 'attack') this.facingRight = opponent.x > this.x;
    }

    applyHit(opponent, m) {
      let baseDmg = m.dmg * this.comboDamageScale;
      if (baseDmg < m.dmg * 0.3) baseDmg = m.dmg * 0.3;
      let isBlock = opponent.isBlocking(this);
      if (isBlock) {
        baseDmg = Math.floor(baseDmg * 0.25);
        opponent.takeBlockstun(m.bs);
        SFX.whoosh();
      } else {
        opponent.takeDamage(baseDmg, m.hs, m.kb||0, this);
        this.energy = Math.min(300, this.energy + 12);
        opponent.energy = Math.min(300, opponent.energy + 8);
        this.comboCount++;
        this.comboDamageScale *= 0.85;
        Effects.triggerHitStop(m.hitstop || 3);
        Effects.addShake(m.dmg > 100 ? 8 : 5);
        Effects.addFlash(0.4);
        if (m.dmg > 100) { Effects.targetZoom = 1.06; SFX.super(); }
        Effects.spawnParticles(opponent.x, opponent.y-40, this.char.color);
        if (m.dmg > 80) SFX.heavy(); else if (m.dmg > 40) SFX.medium(); else SFX.light();
        if (this.comboCount >= 2) { Effects.comboText = `${this.comboCount} HIT`; Effects.comboTimer = 40; }
      }
    }
    isBlocking(attacker) { return this.keys.down || ((attacker.x > this.x && this.keys.left) || (attacker.x < this.x && this.keys.right)); }
    takeDamage(dmg, hs, kb, attacker) {
      if (this.armorActive) { dmg *= 0.4; hs = Math.floor(hs*0.5); }
      this.hp -= dmg; this.hitstunTimer = hs; this.state = 'hitstun';
      if (kb && attacker) this.x += (attacker.x > this.x ? -1 : 1) * kb * 0.4;
      this.x = Math.max(25, Math.min(775, this.x));
      this.comboDamageScale = 1.0;
      this.shakeOffset.x = (Math.random() - 0.5) * 6;
      this.shakeOffset.y = (Math.random() - 0.5) * 4;
    }
    takeBlockstun(bs) { this.blockstunTimer = bs; this.state = 'blockstun'; }
    drawSkeleton(ctx, x, y) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(x + this.shakeOffset.x, 352, 20, 6, 0, 0, Math.PI*2); ctx.fill();
      let t = Date.now() * 0.01;
      let pose = { head:0, body:0, armL:0, armR:0, legL:0, legR:0 };
      if (this.state === 'idle') { pose.armL = Math.sin(t)*0.1; pose.armR = -Math.sin(t)*0.1; }
      else if (this.state === 'move') { pose.legL = Math.sin(t*2)*0.4; pose.legR = -Math.sin(t*2)*0.4; pose.armL = Math.sin(t*2)*0.2; pose.armR = -Math.sin(t*2)*0.2; }
      else if (this.state === 'attack') {
        if (this.movePhase === 'active') { pose.armR = -1.2; pose.body = 0.2; }
        else if (this.movePhase === 'startup') { pose.armR = -0.5; }
      } else if (this.state === 'hitstun') { pose.body = 0.3; pose.head = -0.2; }
      ctx.save(); ctx.translate(x + this.shakeOffset.x, y + 40 + this.shakeOffset.y); ctx.scale(this.facingRight?1:-1, 1);
      ctx.fillStyle = this.char.color;
      ctx.save(); ctx.rotate(pose.legL); ctx.fillRect(-6,20,12,30); ctx.restore();
      ctx.save(); ctx.rotate(pose.legR); ctx.fillRect(-18,20,12,30); ctx.restore();
      ctx.save(); ctx.rotate(pose.body); ctx.fillRect(-14,-30,28,50); ctx.restore();
      ctx.save(); ctx.translate(-14,-20); ctx.rotate(pose.armL); ctx.fillRect(-6,0,12,30); ctx.restore();
      ctx.save(); ctx.translate(14,-20); ctx.rotate(pose.armR); ctx.fillRect(-6,0,12,30); ctx.restore();
      ctx.save(); ctx.translate(0,-45); ctx.rotate(pose.head); ctx.fillStyle='#fff'; ctx.fillRect(-10,-12,20,22); ctx.fillStyle='#000'; ctx.fillRect(-4,-8,8,8); ctx.restore();
      ctx.restore();
      if (this.state === 'attack' && this.movePhase === 'active' && this.currentMove.dmg > 0) {
        ctx.save(); ctx.translate(x, y+40); ctx.scale(this.facingRight?1:-1,1);
        ctx.strokeStyle = this.char.color; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(20, -15, 30, -0.5, 0.8); ctx.stroke();
        ctx.restore();
      }
    }
  }

  function rectCollide(a,b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

  // ==================== 全域變數 ====================
  let player1=null, player2=null, player1Char=null, player2Char=null;
  let gameState = 'menu', gameMode = CONFIG.mode;
  let roundWins=[0,0], roundTimer=0, roundActive=false, winnerOfRound=null;
  let frameAccum = 0;
  const FRAME_DURATION = 1000/60;

  function clearKeys(f) { for (let k in f.keys) f.keys[k] = false; }

  // ==================== AI (狀態機 + 確反意識) ====================
  function aiThink(f, opp) {
    clearKeys(f);
    if (f.aiDelay > 0) { f.aiDelay--; return; }
    let d = opp.x - f.x, ad = Math.abs(d);
    f.aiDelay = 12 + Math.floor(Math.random() * 8);

    // 狀態判定
    if (opp.state === 'hitstun' || opp.state === 'blockstun') {
      f.aiState = 'punish'; // 對手硬直中，嘗試反擊
    } else if (opp.state === 'attack' && ad < 120) {
      f.aiState = 'defend';
    } else if (ad > 180) {
      f.aiState = 'approach';
    } else if (ad < 50) {
      f.aiState = 'pressure';
    } else {
      f.aiState = 'neutral';
    }

    switch (f.aiState) {
      case 'punish':
        if (ad < 80 && f.energy >= 100) f.keys.super = true;
        else if (ad < 70) f.keys.heavy = true;
        else f.keys.medium = true;
        break;
      case 'defend':
        f.keys.down = true;
        if (Math.random() < 0.4) f.keys.left = (d > 0);
        break;
      case 'approach':
        f.keys[d>0?'right':'left'] = true;
        if (Math.random() < 0.3 && f.cooldowns['sp1'] <= 0) f.keys.sp1 = true;
        break;
      case 'pressure':
        if (Math.random() < 0.4) f.keys.light = true;
        else if (Math.random() < 0.7) f.keys.medium = true;
        else f.keys.heavy = true;
        break;
      case 'neutral':
      default:
        if (f.char.projectile && ad > 150 && f.cooldowns['proj'] <= 0 && Math.random() < 0.4) f.keys.proj = true;
        else if (f.energy >= 300 && ad < 160 && Math.random() < 0.15) f.keys.ultra = true;
        else if (f.energy >= 100 && ad < 130 && Math.random() < 0.3) f.keys.super = true;
        else if (ad < 90) {
          if (Math.random() < 0.5) f.keys.medium = true;
          else f.keys.sp2 = true;
        } else {
          f.keys[d>0?'right':'left'] = true;
        }
        break;
    }
  }

  // ==================== 主更新 (幀累加器) ====================
  function processInput(f) {
    if (!f.canAct()) return;
    let k = f.keys;
    if (k.proj && f.char.projectile) { f.startMove('proj'); return; }
    if (k.light) { f.bufferInput('light'); f.canCancelInto('light') ? f.startMove('light',true) : f.startMove('light'); }
    else if (k.medium) { f.bufferInput('medium'); f.canCancelInto('medium') ? f.startMove('medium',true) : f.startMove('medium'); }
    else if (k.heavy) { f.bufferInput('heavy'); f.canCancelInto('heavy') ? f.startMove('heavy',true) : f.startMove('heavy'); }
    else if (k.sp1) f.startMove('sp1');
    else if (k.sp2) { f.bufferInput('sp2'); f.canCancelInto('sp2') ? f.startMove('sp2',true) : f.startMove('sp2'); }
    else if (k.super) { f.bufferInput('super'); f.canCancelInto('super') ? f.startMove('super',true) : f.startMove('super'); }
    else if (k.ultra) f.startMove('ultra');
  }

  function updateFrame() {
    if (gameState !== 'fight' || !roundActive) return;
    // hitstop 期間跳過角色更新與輸入處理
    if (Effects.hitStop > 0) {
      Effects.update();
      return;
    }
    if (player1) clearKeys(player1);
    if (player2) clearKeys(player2);
    if (player2 && player2.isAI) aiThink(player2, player1);
    if (player1) processInput(player1);
    if (player2 && !player2.isAI) processInput(player2);
    // 傳入正確對手
    player1?.updateFrame(player2);
    player2?.updateFrame(player1);
    // Pushbox 平滑推擠
    if (player1 && player2) {
      let p1 = player1.pushbox, p2 = player2.pushbox;
      if (rectCollide(p1, p2)) {
        let dx = (p2.x + p2.w/2) - (p1.x + p1.w/2);
        let overlap = (p1.w/2 + p2.w/2) - Math.abs(dx);
        if (overlap > 0) {
          let push = overlap * 0.4;
          if (dx > 0) { player1.x -= push; player2.x += push; }
          else { player1.x += push; player2.x -= push; }
        }
      }
      // 輕微速度阻尼
      player1.velX *= 0.9;
      player2.velX *= 0.9;
      player1.x = Math.max(25, Math.min(775, player1.x));
      player2.x = Math.max(25, Math.min(775, player2.x));
    }
    Effects.update();
    roundTimer--;
    if (roundTimer <= 0) endRoundByTimeout();
    if ((player1?.hp <= 0) || (player2?.hp <= 0)) endRound();
  }

  function endRoundByTimeout() {
    let w = player1.hp > player2.hp ? 1 : (player2.hp > player1.hp ? 2 : 0);
    winnerOfRound = w; roundActive = false; gameState = 'roundEnd';
    setTimeout(nextRound, 1800);
  }
  function endRound() {
    roundActive = false;
    if (player1.hp <= 0 && player2.hp <= 0) winnerOfRound = 0;
    else winnerOfRound = player2.hp <= 0 ? 1 : 2;
    gameState = 'roundEnd';
    setTimeout(nextRound, 1800);
  }
  function nextRound() {
    if (winnerOfRound === 1) roundWins[0]++; else if (winnerOfRound === 2) roundWins[1]++;
    if (roundWins[0] >= 2 || roundWins[1] >= 2) { gameState = 'matchEnd'; showMatchEnd(); return; }
    startNewRound();
  }
  function startNewRound() {
    player1.reset(250); player2.reset(550); player1.facingRight=true; player2.facingRight=false;
    roundTimer = 99 * 60; roundActive = true; gameState = 'fight'; winnerOfRound = null;
    Effects.roundText = `ROUND ${roundWins[0]+roundWins[1]+1}`; Effects.roundTextTimer = 60;
  }
  function showMatchEnd() {
    menuOverlay.style.display = 'flex';
    menuOverlay.innerHTML = `<h2 style="color:#0ff;">${roundWins[0]>=2?'玩家1':'玩家2'} 勝利!</h2><button class="menu-btn" id="backMenu">返回選單</button>`;
    document.getElementById('backMenu').addEventListener('click', backToMenu);
  }
  function backToMenu() { gameState='menu'; roundWins=[0,0]; player1=player2=null; showMenu(); }

  // ==================== 繪圖 ====================
  function drawBackground() {
    ctx.clearRect(0,0,800,450);
    for (let i=0;i<12;i++) { ctx.fillStyle=`rgba(10,10,30,${0.8+Math.sin(Date.now()*0.001+i)*0.1})`; ctx.fillRect(i*70,60,50,250); }
    ctx.fillStyle='#ff00ff'; ctx.font='bold 18px Arial'; ctx.fillText('NEON',600,100);
    ctx.fillStyle='#00ffff'; ctx.fillText('FIST',620,130);
    ctx.fillStyle='#111122'; ctx.fillRect(0,340,800,120);
  }
  function drawUI() {
    if (!player1 || !player2) return;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(20,10,200,50);
    ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.fillText(player1Char.name,30,30);
    let hpP1 = player1.displayHp / player1.maxHp;
    ctx.fillStyle='#400'; ctx.fillRect(30,35,150,8);
    ctx.fillStyle='#f44'; ctx.fillRect(30,35,150*hpP1,8);
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(580,10,200,50);
    ctx.fillText(player2Char.name,590,30);
    let hpP2 = player2.displayHp / player2.maxHp;
    ctx.fillStyle='#400'; ctx.fillRect(590,35,150,8);
    ctx.fillStyle='#f44'; ctx.fillRect(590,35,150*hpP2,8);
    ctx.fillStyle='#fff'; ctx.font='18px Arial'; ctx.fillText(`⏱ ${Math.ceil(roundTimer/60)}`,370,30);
    if (Effects.comboText) {
      ctx.save(); ctx.font='bold 32px Arial'; ctx.fillStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=15;
      ctx.fillText(Effects.comboText, 350, 200); ctx.restore();
    }
    if (Effects.roundTextTimer > 0) {
      ctx.save(); ctx.font='bold 48px Arial'; ctx.fillStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=20;
      ctx.fillText(Effects.roundText, 250, 250);
      if (Effects.roundTextTimer < 30) ctx.fillText('FIGHT!', 300, 310);
      ctx.restore();
    }
  }
  function draw() {
    ctx.save();
    if (Effects.screenShake > 0.5) { let sx=(Math.random()-0.5)*Effects.screenShake*2, sy=(Math.random()-0.5)*Effects.screenShake*2; ctx.translate(sx,sy); }
    ctx.translate(400, 225); ctx.scale(Effects.cameraZoom, Effects.cameraZoom); ctx.translate(-400, -225);
    drawBackground();
    Effects.afterImages.forEach(ai => { ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=ai.color; ctx.fillRect(ai.x-16,ai.y,32,60); ctx.restore(); });
    player1?.drawSkeleton(ctx, player1.x, player1.y-80);
    player2?.drawSkeleton(ctx, player2.x, player2.y-80);
    Effects.projectiles.forEach(p => { ctx.fillStyle='#ff0'; ctx.fillRect(p.x-4, p.y-4, 8, 8); });
    Effects.particlePool.draw(ctx);
    if (Effects.flashAlpha > 0.01) { ctx.fillStyle=`rgba(255,255,255,${Effects.flashAlpha})`; ctx.fillRect(0,0,800,450); }
    ctx.restore();
    drawUI();
  }

  // ==================== 選單與流程 ====================
  function showMenu() {
    menuOverlay.style.display = 'flex';
    if (CONFIG.platform === 'mobile') {
      menuOverlay.innerHTML = `<h1 style="color:#0ff; text-shadow:0 0 30px #0ff;">NEON FIST</h1>
        <button class="menu-btn" id="btnStart">開始對戰 (AI)</button>`;
      document.getElementById('btnStart').addEventListener('click', ()=>{ initAudio(); startSelect('pve'); });
    } else {
      menuOverlay.innerHTML = `<h1 style="color:#0ff; text-shadow:0 0 30px #0ff;">NEON FIST</h1>
        <button class="menu-btn" id="btnAI">單人 vs AI</button>
        <button class="menu-btn" id="btnPVP">雙人對戰</button>`;
      document.getElementById('btnAI').addEventListener('click', ()=>{ initAudio(); startSelect('pve'); });
      document.getElementById('btnPVP').addEventListener('click', ()=>{ initAudio(); startSelect('pvp'); });
    }
  }
  function startSelect(mode) {
    gameMode = mode; gameState = 'select';
    menuOverlay.innerHTML = `<h2 style="color:#0ff;">選擇角色</h2><div id="charGrid" style="display:flex; justify-content:center; gap:20px;"></div><p id="selInfo" style="color:#aaa;">${mode==='pve'?'你的角色':'玩家1 角色'}</p>`;
    let grid = document.getElementById('charGrid');
    for (let key in CHAR_DATA) {
      let c = CHAR_DATA[key];
      let card = document.createElement('div'); card.className = 'char-select-card';
      card.innerHTML = `<div style="width:70px;height:70px;background:${c.color};margin:0 auto;border-radius:12px;"></div><div style="color:#0ff;margin-top:8px;">${c.name}</div>`;
      card.addEventListener('click', ()=> onSelectChar(key, card));
      grid.appendChild(card);
    }
  }
  function onSelectChar(key, card) {
    if (gameMode === 'pve') {
      player1Char = CHAR_DATA[key];
      let keys = Object.keys(CHAR_DATA);
      player2Char = CHAR_DATA[keys[Math.floor(Math.random()*keys.length)]];
      startFight();
    } else {
      if (!player1Char) { player1Char = CHAR_DATA[key]; document.getElementById('selInfo').textContent = '玩家2 角色'; card.classList.add('selected'); }
      else if (!player2Char) { player2Char = CHAR_DATA[key]; startFight(); }
    }
  }
  function startFight() {
    menuOverlay.style.display = 'none';
    player1 = new Fighter(player1Char, 250, true, 1);
    player2 = new Fighter(player2Char, 550, false, 2, gameMode === 'pve');
    if (CONFIG.platform === 'mobile') setupMobileControls();
    roundWins=[0,0]; startNewRound();
  }

  // 鍵盤
  function handleKeyDown(e) {
    if (gameState !== 'fight') return;
    let p = null;
    if (e.key==='a'||e.key==='A') { p=player1; p.keys.left=true; } if (e.key==='d'||e.key==='D') { p=player1; p.keys.right=true; }
    if (e.key==='w'||e.key==='W') { p=player1; p.keys.up=true; } if (e.key==='s'||e.key==='S') { p=player1; p.keys.down=true; }
    if (e.key==='j'||e.key==='J') { p=player1; p.keys.light=true; } if (e.key==='k'||e.key==='K') { p=player1; p.keys.medium=true; }
    if (e.key==='l'||e.key==='L') { p=player1; p.keys.heavy=true; } if (e.key==='u'||e.key==='U') { p=player1; p.keys.sp1=true; }
    if (e.key==='i'||e.key==='I') { p=player1; p.keys.sp2=true; } if (e.key==='o'||e.key==='O') { p=player1; p.keys.super=true; }
    if (e.key==='p'||e.key==='P') { p=player1; p.keys.ultra=true; } if (e.key==='y'||e.key==='Y') { p=player1; p.keys.proj=true; }
    if (gameMode === 'pvp' && player2) {
      if (e.key==='ArrowLeft') { p=player2; p.keys.left=true; } if (e.key==='ArrowRight') { p=player2; p.keys.right=true; }
      if (e.key==='ArrowUp') { p=player2; p.keys.up=true; } if (e.key==='ArrowDown') { p=player2; p.keys.down=true; }
      if (e.key==='1') { p=player2; p.keys.light=true; } if (e.key==='2') { p=player2; p.keys.medium=true; }
      if (e.key==='3') { p=player2; p.keys.heavy=true; } if (e.key==='4') { p=player2; p.keys.sp1=true; }
      if (e.key==='5') { p=player2; p.keys.sp2=true; } if (e.key==='6') { p=player2; p.keys.super=true; }
      if (e.key==='7') { p=player2; p.keys.ultra=true; } if (e.key==='8') { p=player2; p.keys.proj=true; }
    }
    if (p) e.preventDefault();
  }
  function handleKeyUp(e) {
    let p = null;
    if (e.key==='a'||e.key==='A') { p=player1; p.keys.left=false; } if (e.key==='d'||e.key==='D') { p=player1; p.keys.right=false; }
    if (e.key==='w'||e.key==='W') { p=player1; p.keys.up=false; } if (e.key==='s'||e.key==='S') { p=player1; p.keys.down=false; }
    if (e.key==='j'||e.key==='J') { p=player1; p.keys.light=false; } if (e.key==='k'||e.key==='K') { p=player1; p.keys.medium=false; }
    if (e.key==='l'||e.key==='L') { p=player1; p.keys.heavy=false; } if (e.key==='u'||e.key==='U') { p=player1; p.keys.sp1=false; }
    if (e.key==='i'||e.key==='I') { p=player1; p.keys.sp2=false; } if (e.key==='o'||e.key==='O') { p=player1; p.keys.super=false; }
    if (e.key==='p'||e.key==='P') { p=player1; p.keys.ultra=false; } if (e.key==='y'||e.key==='Y') { p=player1; p.keys.proj=false; }
    if (gameMode === 'pvp' && player2) {
      if (e.key==='ArrowLeft') { p=player2; p.keys.left=false; } if (e.key==='ArrowRight') { p=player2; p.keys.right=false; }
      if (e.key==='ArrowUp') { p=player2; p.keys.up=false; } if (e.key==='ArrowDown') { p=player2; p.keys.down=false; }
      if (e.key==='1') { p=player2; p.keys.light=false; } if (e.key==='2') { p=player2; p.keys.medium=false; }
      if (e.key==='3') { p=player2; p.keys.heavy=false; } if (e.key==='4') { p=player2; p.keys.sp1=false; }
      if (e.key==='5') { p=player2; p.keys.sp2=false; } if (e.key==='6') { p=player2; p.keys.super=false; }
      if (e.key==='7') { p=player2; p.keys.ultra=false; } if (e.key==='8') { p=player2; p.keys.proj=false; }
    }
  }

  function setupMobileControls() {
    touchLayer.style.display = 'block';
    touchLayer.innerHTML = `
      <div id="joyL" class="joystick-zone" style="left:5%;bottom:8%;width:24%;aspect-ratio:1;"></div>
      <div style="position:absolute;right:5%;bottom:8%;display:flex;flex-wrap:wrap;gap:6px;width:28%;">
        <div class="touch-btn" data-act="light" style="width:45%;height:50px;">輕</div>
        <div class="touch-btn" data-act="medium" style="width:45%;height:50px;">中</div>
        <div class="touch-btn" data-act="heavy" style="width:45%;height:50px;">重</div>
        <div class="touch-btn" data-act="sp2" style="width:45%;height:50px;">特</div>
      </div>
      <div style="position:absolute;top:5%;right:5%;display:flex;gap:6px;">
        <div class="touch-btn" data-act="super" style="width:60px;height:40px;">必殺</div>
        <div class="touch-btn" data-act="ultra" style="width:60px;height:40px;">大招</div>
      </div>`;
    document.querySelectorAll('.touch-btn').forEach(btn => {
      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        if (!player1) return;
        player1.keys[btn.dataset.act] = true;
        player1.bufferInput(btn.dataset.act);
      });
      btn.addEventListener('touchend', e => {
        e.preventDefault();
        if (player1) player1.keys[btn.dataset.act] = false;
      });
    });
    const joyZone = document.getElementById('joyL');
    let active = false;
    joyZone.addEventListener('touchstart', e => { e.preventDefault(); active = true; });
    joyZone.addEventListener('touchmove', e => {
      if (!active || !player1) return;
      let rect = joyZone.getBoundingClientRect();
      let cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
      let dx = e.touches[0].clientX - cx, dy = e.touches[0].clientY - cy;
      let dist = Math.sqrt(dx*dx+dy*dy);
      let radius = rect.width/2;
      if (dist > radius) { dx *= radius/dist; dy *= radius/dist; }
      player1.keys.left = dx < -10; player1.keys.right = dx > 10;
      player1.keys.up = dy < -10; player1.keys.down = dy > 10;
    });
    joyZone.addEventListener('touchend', () => { active = false; if(player1) { player1.keys.left=player1.keys.right=player1.keys.up=player1.keys.down=false; } });
  }

  // ==================== 主循環 ====================
  let lastTime = 0;
  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  showMenu();
  function gameLoop(ts) {
    if (!lastTime) lastTime = ts;
    let dt = ts - lastTime;
    lastTime = ts;
    frameAccum += dt;
    while (frameAccum >= FRAME_DURATION) {
      updateFrame();
      frameAccum -= FRAME_DURATION;
    }
    draw();
    requestAnimationFrame(gameLoop);
  }
  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
